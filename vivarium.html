<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vivarium Advisor</title>
    <link rel="stylesheet" href="vivarium.css" />
  </head>

  <body>
    <header class="gallery-header">
      <div class="logo">Vivarium Advisor</div>
      <a href="Mylizard.html" class="home-btn">홈으로</a>
    </header>

    <main>
      <section class="viva-container">
        <div class="quiz-card">
          <h2 class="quiz-title">🦎 맞춤형 사육장 매니저</h2>
          <p class="quiz-subtitle">
            반려 파충류의 환경을 선택하면 알맞은 비바리움을 추천합니다.
          </p>

          <div class="quiz-group">
            <label>1. 사육장 크기 선택</label>
            <select id="vivaSize">
              <option value="소">소형 (30x30 이하 / 베이비, 소형 게코)</option>
              <option value="중">
                중형 (2자 내외 / 크레스티드 성체, 레오파드 성체)
              </option>
              <option value="대">대형 (3자 내외 / 비어디 드래곤 성체)</option>
              <option value="특대">
                특대형 (4자 이상 / 대형 모니터, 테구)
              </option>
            </select>
          </div>

          <div class="quiz-group">
            <label>2. 나무 위나 벽에 붙어 사는 종인가요? (붙이류)</label>
            <div class="radio-wrap">
              <label
                ><input type="radio" name="isArboreal" value="O" checked /> 예
                (O)</label
              >
              <label
                ><input type="radio" name="isArboreal" value="X" /> 아니오
                (X)</label
              >
            </div>
          </div>

          <div class="quiz-group">
            <label>3. 야간이나 주간 히팅 램프가 필요한가요?</label>
            <div class="radio-wrap">
              <label
                ><input type="radio" name="needsHeat" value="O" checked /> 예
                (O)</label
              >
              <label
                ><input type="radio" name="needsHeat" value="X" /> 아니오
                (X)</label
              >
            </div>
          </div>

          <div class="quiz-group">
            <label>4. 바닥재가 필요한가요?</label>
            <div class="radio-wrap">
              <label
                ><input type="radio" name="needsSubstrate" value="O" checked />
                예 (O)</label
              >
              <label
                ><input type="radio" name="needsSubstrate" value="X" /> 아니오
                (X)</label
              >
            </div>
          </div>

          <button id="recommendBtn">추천 사육장 보기</button>
        </div>

        <div id="resultView" class="result-card" style="display: none">
          <h2 class="result-title">✨ 추천 비바리움 가이드</h2>

          <div class="result-box">
            <h4>📦 추천 사육장 조합</h4>
            <p id="cageResult" class="highlight-text"></p>
          </div>

          <div class="result-box">
            <h4>🌿 인조식물 및 꾸미기 용품 추천</h4>
            <ul id="decoResult" class="deco-list"></ul>
          </div>
        </div>
      </section>
    </main>

    <script>
      document.getElementById("recommendBtn").addEventListener("click", () => {
        const size = document.getElementById("vivaSize").value;
        const isArboreal = document.querySelector(
          'input[name="isArboreal"]:checked',
        ).value;
        const needsHeat = document.querySelector(
          'input[name="needsHeat"]:checked',
        ).value;
        const needsSubstrate = document.querySelector(
          'input[name="needsSubstrate"]:checked',
        ).value;

        let cageText = "";
        let decoItems = [];

        // 1. 사육장 조합 매칭 계산
        if (isArboreal === "O") {
          cageText = `[적층형/세로형] 유리 혹은 아크릴 포맥스 하이(High)형 ${size} 사육장`;
          decoItems.push("🌳 정글 바인 (구부릴 수 있는 인조 넝쿨 줄기)");
          decoItems.push("🍃 흡착식 벽면 인조 아이비/스킨답서스 잎사귀");
          decoItems.push("🦎 높은 곳에 매다는 인조 코코넛 은신처");
        } else {
          cageText = `[가로형/와이드] 포맥스 또는 유리 와이드(Wide)형 ${size} 사육장`;
          decoItems.push("🪵 바닥 유목 및 넙적한 코르크 보드");
          decoItems.push("🌿 바닥에 깔아두는 인조 고사리류 / 볼 부쉬 식물");
          decoItems.push("🪨 안정감을 주는 다공질 바위 무늬 인조 은신처");
        }

        // 2. 히팅 옵션 추가
        if (needsHeat === "O") {
          cageText += " + 상단 소켓 타공 및 안전망 세트";
          decoItems.push(
            "☀️ 주간용 스팟 램프 또는 야간용 세라믹 히터 + 자동 온도 조절기",
          );
        } else {
          decoItems.push("💡 내부 관찰 및 식물 무드를 위한 안전 LED 바 조명");
        }

        // 3. 바닥재 옵션 추가
        if (needsSubstrate === "O") {
          if (needsHeat === "O") {
            decoItems.push(
              "🪵 습도 및 먼지 관리에 좋은 바크 또는 코코피트 바닥재",
            );
          } else {
            decoItems.push(
              "🪵 습계형 파충류용 수분 유지 코코허스크 또는 황토 매트",
            );
          }
        } else {
          decoItems.push(
            "🧼 위생적이고 세척이 쉬운 파충류 전용 키친타월 또는 친환경 펠트 매트",
          );
        }

        // 결과 화면에 뿌려주기
        document.getElementById("cageResult").innerText = cageText;

        const decoUl = document.getElementById("decoResult");
        decoUl.innerHTML = "";
        decoItems.forEach((item) => {
          const li = document.createElement("li");
          li.innerText = item;
          decoUl.appendChild(li);
        });

        // 결과창 부드럽게 노출
        const resultView = document.getElementById("resultView");
        resultView.style.display = "block";
        resultView.scrollIntoView({ behavior: "smooth" });
      });
    </script>
  </body>
</html>
