<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Lizard Community</title>
    <link rel="stylesheet" href="/css/community.css" />
  </head>

  <body>
    <header class="gallery-header">
      <div class="logo">My Lizard Community</div>
      <a href="/Home/Home.html" class="home-btn">홈으로</a>
    </header>

    <main>
      <section class="post-section">
        <div class="post-write-wrap">
          <input type="text" id="postTitle" placeholder="제목을 입력하세요" />
          <textarea id="postContent" placeholder="내용을 입력하세요"></textarea>
          <button id="postBtn">글 작성</button>
        </div>
      </section>

      <section id="postList"></section>
    </main>

    <script>
      // --- 1. DOM 요소 가져오기 ---
      const postTitle = document.getElementById("postTitle");
      const postContent = document.getElementById("postContent");
      const postBtn = document.getElementById("postBtn");
      const postList = document.getElementById("postList");

      // --- 2. 로컬 스토리지 데이터 초기화 ---
      // 기존에 저장된 게시글 데이터가 있으면 가져오고, 없으면 빈 배열([])로 시작합니다.
      let posts = JSON.parse(localStorage.getItem("communityPosts")) || [];

      // 페이지 로드 시 기존에 저장되어 있던 게시글들을 화면에 그려줍니다.
      posts.forEach((post) => {
        createPost(post);
      });

      // --- 3. 이벤트 리스너: 새 게시글 작성 ---
      postBtn.addEventListener("click", () => {
        const title = postTitle.value.trim();
        const content = postContent.value.trim();

        // 제목이나 내용이 비어있으면 경고창을 띄우고 중단합니다.
        if (!title || !content) {
          alert("제목과 내용을 입력해주세요.");
          return;
        }

        // 새 게시글 객체 생성 (댓글은 빈 배열로 시작)
        const post = {
          title,
          content,
          comments: [],
        };

        // 최신 글이 맨 위에 오도록 배열의 맨 앞에 추가(unshift)합니다.
        posts.unshift(post);
        savePosts(); // 로컬 스토리지에 동기화
        createPost(post, true); // 화면 맨 위에 카드 추가 (prepend = true)

        // 입력창 비우기
        postTitle.value = "";
        postContent.value = "";
      });

      // --- 4. 공통 함수: 데이터 저장 ---
      // 현재 posts 배열의 상태를 로컬 스토리지에 JSON 문자열 형태로 저장합니다.
      function savePosts() {
        localStorage.setItem("communityPosts", JSON.stringify(posts));
      }

      // --- 5. 공통 함수: 게시글 카드 생성 및 렌더링 ---
      function createPost(post, prepend = false) {
        const card = document.createElement("div");
        card.className = "post-card";

        // 게시글 카드의 기본 HTML 구조 정의
        card.innerHTML = `
          <div class="post-header">
            <h3>${post.title}</h3>
            <button class="delete-post-btn">삭제</button>
          </div>
          <p class="post-body-content">${post.content}</p>
          <div class="comments"></div>
          
          <div class="comment-input-wrap">
            <input class="comment-input" placeholder="댓글 작성...">
            <button class="comment-btn">댓글 달기</button>
          </div>
        `;

        const commentsDiv = card.querySelector(".comments");

        // [기능] 게시글 삭제 버튼 클릭 이벤트
        card.querySelector(".delete-post-btn").addEventListener("click", () => {
          if (!confirm("게시글을 삭제하시겠습니까?")) {
            return;
          }

          // 배열에서 해당 게시글을 찾아 제거합니다.
          const index = posts.indexOf(post);
          if (index > -1) {
            posts.splice(index, 1);
          }

          savePosts(); // 로컬 스토리지 갱신
          card.remove(); // 화면에서 엘리먼트 삭제
        });

        // [기능] 해당 게시글에 저장되어 있던 기존 댓글 목록 불러오기
        post.comments.forEach((comment) => {
          createComment(comment, post, commentsDiv);
        });

        // [기능] 댓글 작성 버튼 클릭 이벤트
        card.querySelector(".comment-btn").addEventListener("click", () => {
          const input = card.querySelector(".comment-input");
          const text = input.value.trim();

          if (!text) return; // 내용이 없으면 무시

          post.comments.push(text); // 게시글 객체의 comments 배열에 새 댓글 추가
          savePosts(); // 로컬 스토리지 갱신
          createComment(text, post, commentsDiv); // 화면에 댓글 추가
          input.value = ""; // 댓글 입력창 비우기
        });

        // prepend 옵션에 따라 새 글은 맨 위에, 기존 글은 순서대로 아래에 붙입니다.
        if (prepend) {
          postList.prepend(card);
        } else {
          postList.appendChild(card);
        }
      }

      // --- 6. 공통 함수: 댓글 아이템 생성 및 렌더링 ---
      function createComment(text, post, commentsDiv) {
        const div = document.createElement("div");
        div.className = "comment";

        // 댓글 HTML 구조 정의 (내용과 삭제 버튼)
        div.innerHTML = `
          <span>${text}</span>
          <button class="delete-comment-btn">✕</button>
        `;

        // [기능] 댓글 개별 삭제 버튼 클릭 이벤트
        div
          .querySelector(".delete-comment-btn")
          .addEventListener("click", () => {
            // 해당 게시글의 comments 배열에서 해당 댓글 텍스트를 찾아 제거합니다.
            const index = post.comments.indexOf(text);
            if (index > -1) {
              post.comments.splice(index, 1);
            }

            savePosts(); // 로컬 스토리지 갱신
            div.remove(); // 화면에서 댓글 엘리먼트 삭제
          });

        // 댓글 영역의 하단에 추가합니다.
        commentsDiv.appendChild(div);
      }
    </script>
  </body>
</html>
